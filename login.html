<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<script src="backend.js"></script>

<body>

<div class="container">
  <div class="border rounded p-3 d-flex flex-column h-100">
    <form id="form-login"
          action="https://demo.opencart.com/en-gb?route=account/login.login&login_token=4413e4356126fe3f422aa08aae"
          method="post"
          data-oc-toggle="ajax">

      <h2>Returning Customer</h2>
      <p><strong>I am a returning customer</strong></p>

      <div class="mb-3">
        <label for="input-email" class="col-form-label">E-Mail Address</label>
        <input type="text" name="email" value="" placeholder="E-Mail Address"
               id="input-email" class="form-control">
      </div>

      <div class="mb-3">
        <label for="input-password" class="col-form-label">Password</label>
        <input type="password" name="password" value=""
               placeholder="Password" id="input-password"
               class="form-control mb-1">
        <a href="forgot-password.html">Forgotten Password</a>
      </div>

      <div class="text-end">
        <button type="submit" class="btn btn-primary">Login</button>
      </div>

      <p style="margin-top:15px;">
        New user? <a href="register.html">Register Account</a>
      </p>

    </form>
  </div>
</div>

</body>
</html>
