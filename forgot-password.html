<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<script src="backend.js"></script>

<body>

<div class="container">
  <div id="content" class="col">
    <h1>Forgot Your Password?</h1>
    <p>
      Enter the e-mail address associated with your account.
      Click submit to have a password reset link e-mailed to you.
    </p>

    <form id="form-forgotten"
          action="https://demo.opencart.com/en-gb?route=account/forgotten.confirm"
          method="post"
          data-oc-toggle="ajax">

      <fieldset>
        <legend>Your E-Mail Address</legend>

        <div class="row mb-3 required">
          <label for="input-email" class="col-sm-2 col-form-label">E-Mail Address</label>
          <div class="col-sm-10">
            <input type="text" name="email" value=""
                   placeholder="E-Mail Address"
                   id="input-email" class="form-control">
            <div id="error-email" class="invalid-feedback"></div>
          </div>
        </div>
      </fieldset>

      <div class="row">
        <div class="col">
          <a href="login.html" class="btn btn-light">Back</a>
        </div>
        <div class="col text-end">
          <button type="submit" class="btn btn-primary">Continue</button>
        </div>
      </div>

    </form>
  </div>
</div>

</body>
</html>
